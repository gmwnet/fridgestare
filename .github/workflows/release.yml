name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Attach upgrade.php to release
        uses: softprops/action-gh-release@v2
        with:
          files: upgrade.php
          generate_release_notes: true
